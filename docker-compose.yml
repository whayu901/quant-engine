services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: qual
      POSTGRES_PASSWORD: qual
      POSTGRES_DB: qualengine
    volumes: [pgdata:/var/lib/postgresql/data]
    ports: ["5432:5432"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  backend:
    build: ./backend
    env_file: .env
    depends_on: [db, redis]
    ports: ["8000:8000"]

  worker:
    build: ./backend
    command: celery -A app.celery_app worker --loglevel=info
    env_file: .env
    depends_on: [db, redis]

volumes:
  pgdata:
