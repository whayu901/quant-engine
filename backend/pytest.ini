[pytest]
# Pytest configuration for Qual Engine backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Markers for organizing tests
markers =
    unit: Unit tests (isolated, no external dependencies)
    integration: Integration tests (with database)
    api: API/endpoint tests (with FastAPI TestClient)
    e2e: End-to-end tests (full request flow)
    slow: Slow tests that may take longer
    auth: Authentication tests
    db: Database tests
    service: Service layer tests
    router: Router/endpoint tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Coverage options
[coverage:run]
source = app
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
    @abc.abstractmethod
    if sys.version_info

# Minimum coverage thresholds
fail_under = 80
precision = 2

# Coverage HTML reports
[coverage:html]
directory = htmlcov
