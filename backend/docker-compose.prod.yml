version: '3.8'

services:
  # PostgreSQL Database - Production Configuration
  postgres:
    image: postgres:14-alpine
    container_name: qual-engine-postgres
    restart: always
    environment:
      POSTGRES_DB: qualengine
      POSTGRES_USER: qualengine
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./scripts/backup:/backup
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qualengine"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qual-engine-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # Redis Cache & Message Broker - Production Configuration
  redis:
    image: redis:7-alpine
    container_name: qual-engine-redis
    restart: always
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - qual-engine-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # FastAPI Backend Application - Production Configuration
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=production
    image: qual-engine-backend:${VERSION:-latest}
    container_name: qual-engine-backend
    restart: always
    environment:
      APP_ENV: production
      DEBUG: "false"
      DATABASE_URL: postgresql://qualengine:${DB_PASSWORD}@postgres:5432/qualengine
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      SENTRY_DSN: ${SENTRY_DSN}
      # Performance tuning
      WEB_CONCURRENCY: ${WEB_CONCURRENCY:-4}
      WORKER_CLASS: uvicorn.workers.UvicornWorker
      WORKER_CONNECTIONS: ${WORKER_CONNECTIONS:-1000}
      KEEPALIVE: ${KEEPALIVE:-5}
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./alembic:/app/alembic:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - qual-engine-network
    deploy:
      replicas: ${BACKEND_REPLICAS:-2}
      resources:
        limits:
          memory: 2G
          cpus: '2'
        reservations:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    command: >
      sh -c "
        echo 'Running production startup checks...' &&
        alembic upgrade head &&
        echo 'Starting Gunicorn with Uvicorn workers...' &&
        gunicorn app.main:app
          --workers ${WEB_CONCURRENCY:-4}
          --worker-class uvicorn.workers.UvicornWorker
          --bind 0.0.0.0:8000
          --max-requests 1000
          --max-requests-jitter 50
          --timeout 30
          --keepalive 5
          --access-logfile -
          --error-logfile -
          --log-level info
      "

  # Celery Worker - Production Configuration
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: qual-engine-backend:${VERSION:-latest}
    container_name: qual-engine-celery-worker
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://qualengine:${DB_PASSWORD}@postgres:5432/qualengine
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SENTRY_DSN: ${SENTRY_DSN}
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - qual-engine-network
    deploy:
      replicas: ${CELERY_WORKERS:-2}
      resources:
        limits:
          memory: 1G
          cpus: '1'
        reservations:
          memory: 256M
          cpus: '0.25'
    command: >
      celery -A app.tasks worker
        --loglevel=info
        --concurrency=${CELERY_CONCURRENCY:-4}
        --max-tasks-per-child=100
        --time-limit=300
        --soft-time-limit=240

  # Celery Beat - Production Configuration
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: qual-engine-backend:${VERSION:-latest}
    container_name: qual-engine-celery-beat
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql://qualengine:${DB_PASSWORD}@postgres:5432/qualengine
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - qual-engine-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
        reservations:
          memory: 128M
          cpus: '0.1'
    command: celery -A app.tasks beat --loglevel=info --pidfile=/tmp/celerybeat.pid

  # Nginx Load Balancer & Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: qual-engine-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./storage/static:/usr/share/nginx/html/static:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
    networks:
      - qual-engine-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.25'
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus - Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: qual-engine-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - qual-engine-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Grafana - Metrics Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: qual-engine-grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_INSTALL_PLUGINS: redis-datasource
    volumes:
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - qual-engine-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

  # Caddy - Automatic HTTPS (Alternative to Nginx)
  # Uncomment if you prefer Caddy over Nginx for automatic HTTPS
  # caddy:
  #   image: caddy:alpine
  #   container_name: qual-engine-caddy
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - backend
  #   networks:
  #     - qual-engine-network

networks:
  qual-engine-network:
    driver: bridge
    driver_opts:
      com.docker.network.driver.mtu: 1450

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  # caddy_data:
  #   driver: local
  # caddy_config:
  #   driver: local